name: medicine_reminder
description: A clean Flutter medication reminder app UI with authentication and medicine flows.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  provider: ^6.1.5+1
  go_router: ^17.2.3
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  intl: ^0.20.2
  flutter_timezone: ^5.0.2
  image_picker: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/app_logo.png
